<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerShell</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Spice&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light">
    <div id="page-loader" class="page-loader">
        <div class="loader-content">
            <i class="ph-fill ph-moon-stars loader-icon"></i>
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Interactive Dots Background -->
    <div id="dots-bg"></div>

    <!-- Clock Background -->
    <div id="clock-bg-wrapper">
        <div class="bg-clock-container">
            <div class="bg-clock-face">
                <div class="bg-clock-bubble-wrap">
                    <div class="bg-clock-bubbles-bg">
                        <span style="--i:15;"></span><span style="--i:12;"></span><span style="--i:18;"></span>
                        <span style="--i:22;"></span><span style="--i:20;"></span><span style="--i:23;"></span>
                        <span style="--i:13;"></span><span style="--i:18;"></span><span style="--i:28;"></span>
                        <span style="--i:24;"></span><span style="--i:15;"></span><span style="--i:21;"></span>
                    </div>
                </div>
                <div class="bg-clock-border-circle"></div>
                <div class="bg-clock-border-circle"></div>
                <div class="bg-clock-border-circle"></div>
                
                <div class="bg-clock-inner-circle" id="bg-clock-sec"><div></div></div>
                <div class="bg-clock-inner-circle bg-clock-inner-circle-2" id="bg-clock-min"><div></div></div>
                <div class="bg-clock-inner-circle bg-clock-inner-circle-3" id="bg-clock-hrs"><div></div></div>
                
                <span class="bg-clock-span" style="--i:1;"><b>1</b></span>
                <span class="bg-clock-span" style="--i:2;"><b>2</b></span>
                <span class="bg-clock-span" style="--i:3;"><b>3</b></span>
                <span class="bg-clock-span" style="--i:4;"><b>4</b></span>
                <span class="bg-clock-span" style="--i:5;"><b>5</b></span>
                <span class="bg-clock-span" style="--i:6;"><b>6</b></span>
                <span class="bg-clock-span" style="--i:7;"><b>7</b></span>
                <span class="bg-clock-span" style="--i:8;"><b>8</b></span>
                <span class="bg-clock-span" style="--i:9;"><b>9</b></span>
                <span class="bg-clock-span" style="--i:10;"><b>10</b></span>
                <span class="bg-clock-span" style="--i:11;"><b>11</b></span>
                <span class="bg-clock-span" style="--i:12;"><b>12</b></span>
                
                <div class="bg-clock-digital-time-wrap">
                    <div id="bg-clock-digital-time">
                        <div id="bg-clock-hours">00</div>
                        <div id="bg-clock-minutes">00</div>
                        <div id="bg-clock-seconds">00</div>
                        <div id="bg-clock-ampm">PM</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="cursor-glow"></div>
    <div id="mobile-overlay" class="mobile-overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="logo anim-item">
            <i class="ph-fill ph-moon-stars"></i>
            <span>Combine PowerShell Scripts</span>
        </div>
        <div class="menu-list anim-item" id="menu-list"></div>
    </aside>

    <main class="main-content">
        <header class="header" id="header">
            <div class="header-title-wrapper anim-item">
                <h1 id="category-title">รายการทั้งหมด</h1>
                <span id="item-count"></span>
            </div>
            <div class="header-actions">
                <div class="search-box anim-item" style="--anim-delay: 0.3s;">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" class="search-input" id="search-input" placeholder="ค้นหาสคริปต์...">
                </div>
                <a href="https://github.com/phwyverysad" target="_blank" class="action-btn github-btn anim-item" style="--anim-delay: 0.4s;">
                    <i class="ph-bold ph-github-logo"></i>
                </a>
                <button id="theme-toggle" class="action-btn theme-btn anim-item" style="--anim-delay: 0.5s;">
                    <i class="ph-bold ph-moon"></i>
                </button>
                <button id="menu-btn" class="action-btn menu-btn anim-item mobile-only" style="--anim-delay: 0.6s;">
                    <i class="ph-bold ph-list"></i>
                </button>
            </div>
        </header>
        <section class="content-area" id="content-scroll">
            <div class="grid" id="card-grid"></div>
        </section>
    </main>

    <div class="toast" id="toast">
        <i class="ph-fill ph-check-circle"></i>
        <span>คัดลอกคำสั่งเรียบร้อยแล้ว</span>
    </div>

    <script src="script.js"></script>
    <script src="interactive-dots.js"></script>
    <script src="clock-bg.js"></script>
</body>
</html>
