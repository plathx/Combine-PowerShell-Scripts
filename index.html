<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerShell</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light">
    <div id="preloader">
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
        <i class="ph-fill ph-moon-stars pulse-icon"></i>
    </div>
    
    <div class="fluid-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>
    
    <div class="bg-grid"></div>
    <div class="particles-container" id="particles-container"></div>

    <aside class="sidebar glass-panel">
        <div class="logo magnetic-btn">
            <i class="ph-fill ph-moon-stars"></i>
            <span class="glitch-text" data-text="Scripts Hub">Combine PowerShell</span>
        </div>
        <div class="menu-list" id="menu-list"></div>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="header-title-wrapper">
                <h1 id="category-title" class="typing-text">รายการทั้งหมด</h1>
                <span id="item-count" class="badge-pop"></span>
            </div>
            <div class="header-actions">
                <div class="search-wrapper">
                    <i class="ph ph-magnifying-glass search-icon"></i>
                    <input type="text" class="search-input" id="search-input" placeholder="ค้นหาสคริปต์...">
                </div>
                <a href="https://github.com/phwyverysad" target="_blank" class="action-btn magnetic-btn">
                    <i class="ph-bold ph-github-logo"></i>
                </a>
                <button id="theme-toggle" class="action-btn magnetic-btn">
                    <i class="ph-bold ph-moon"></i>
                </button>
            </div>
        </header>
        
        <section class="content-area" id="content-scroll">
            <div class="grid" id="card-grid"></div>
        </section>
    </main>

    <div class="toast" id="toast">
        <div class="toast-content">
            <i class="ph-fill ph-check-circle"></i>
            <span id="toast-message">คัดลอกคำสั่งเรียบร้อยแล้ว</span>
        </div>
        <div class="toast-progress"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
